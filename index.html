<html>
<head>
    <script>
        // A function to fetch the joke from the API and display it on the page
        function getJoke() {
            // Create a new XMLHttpRequest object
            var xhr = new XMLHttpRequest();
            // Set the request method and the API URL
            xhr.open("GET", "https://v2.jokeapi.dev/joke/Programming?blacklistFlags=nsfw,religious,political,racist,sexist,explicit&format=txt");
            // Set the response type to text
            xhr.responseType = "text";
            // Define what to do when the request is successful
            xhr.onload = function() {
                // Get the response text
                var joke = xhr.response;
                // Find the element with id="joke" on the page
                var jokeElement = document.getElementById("joke");
                // Set the inner HTML of the element to the joke
                jokeElement.innerHTML = joke;
            };
            // Send the request
            xhr.send();
        }
    </script>
</head>
<body>
    <h1>Random Programming Joke</h1>
    <p id="joke">Click the button to get a joke.</p>
    <button onclick="getJoke()">Get Joke</button>
</body>
</html>
