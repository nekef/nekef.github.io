<!DOCTYPE html>
<html>
<head>
    <title>Activity Fetcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background-color: #0056b3;
        }
        p {
            font-size: 1.2em;
            color: #555;
        }
         #help-link {
            position: fixed;
            bottom: 0;
            left: 0;
            color: blue;
        }
        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            padding: 20px;
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1);
            z-index: 999;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        .cookie-content {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .cookie-text {
            flex: 1 1 70%;
            color: #fff;
            margin-bottom: 10px;
        }
        .cookie-buttons {
            flex: 1 1 30%;
            text-align: center;
        }
        .cookie-button {
            background-color: #fff;
            color: #333;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 5px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .cookie-button:hover {
            background-color: #ddd;
        }
    </style>
</head>

<div class="cookie-banner">
    <div class="container cookie-content">
        <div class="cookie-text">
            We use cookies to personalize content and ads, to provide social media features and to analyze our traffic. We also share information about your use of our site with our social media, advertising and analytics partners.
        </div>
        <div class="cookie-buttons">
            <button class="cookie-button" onclick="acceptAllCookies()">Accept All</button>
            <button class="cookie-button" onclick="rejectNonEssentialCookies()">Reject Non-Essential</button>
        </div>
    </div>
</div>
    
<body>
    <h1>Do Something</h1>
    <button onclick="getActivity()">Get Something</button>
    <p id="activity"></p>
    <p id="type"></p>

    <script>
        function getActivity() {
            fetch('https://www.boredapi.com/api/activity')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('activity').textContent = 'Activity: ' + data.activity;
                    document.getElementById('type').textContent = 'Type: ' + data.type;
                })
                .catch(error => console.error('Error:', error));
        }
    </script>


    <script>
    function setCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }

    function acceptAllCookies() {
        setCookie('analytics', 'true', 365); // Setting analytics cookie to expire in 365 days
        hideCookieBanner();
    }

    function rejectNonEssentialCookies() {
        hideCookieBanner();
    }

    function hideCookieBanner() {
        document.querySelector('.cookie-banner').style.display = 'none';
    }
</script>

   <a id="help-link" href="/help/help.html">Help</a>


</body>
</html>
