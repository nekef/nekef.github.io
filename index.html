<!DOCTYPE html>
<html>
<head>
  <script src="//unpkg.com/brain.js"></script>
  <style>
    .result { margin-top: 20px; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Deep Learning with brain.js</h1>
  <form id="inputForm">
    <label for="input1">Input 1:</label>
    <input type="number" id="input1" value="1">
    <label for="input2">Input 2:</label>
    <input type="number" id="input2" value="0">
    <input type="submit" value="Run Network">
  </form>
  <div id="demo" class="result"></div>

  <script>
    // Create a Neural Network
    const network = new brain.NeuralNetwork();

    // Train the Network with 4 input objects
    network.train([
      {input:[0,0], output:{zero:1}},
      {input:[0,1], output:{one:1}},
      {input:[1,0], output:{one:1}},
      {input:[1,1], output:{zero:1}},
    ]);

    document.getElementById('inputForm').addEventListener('submit', function(event) {
      event.preventDefault();
      runNetwork();
    });

    function runNetwork() {
  // Get the values from the input fields
  let val1 = document.getElementById('input1').value;
  let val2 = document.getElementById('input2').value;

  // Check if the inputs are numbers
  if (isNaN(val1) || isNaN(val2)) {
    document.getElementById("demo").innerHTML = "<p class='error'>Please enter valid numbers.</p>";
    return;
  }

  // Normalize the input values to be between 0 and 1
  val1 = Number(val1) / 1000; // assuming the input is less than 100
  val2 = Number(val2) / 1000; // assuming the input is less than 100

  // Run the network
  let result = network.run([val1, val2]);

  // Display the probability for "zero" and "one"
  document.getElementById("demo").innerHTML =
    "<p>Probability:</p>" +
    "<ul>" +
    "<li>One: " + result["one"] + "</li>" +
    "<li>Zero: " + result["zero"] + "</li>" +
    "</ul>";
}

  </script>
</body>
</html>
