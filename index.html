
<!DOCTYPE html>
<html>
<body>

<h2>IP Address Generator</h2>

<p>Enter the number of IP addresses to generate:</p>

<input type="number" id="numIPs" name="numIPs">
<button onclick="generateIPs()">Generate</button>

<p id="output"></p>

<script>
function generateIPs() {
  var numIPs = document.getElementById("numIPs").value;
  var output = document.getElementById("output");
  output.innerHTML = "";

  for (var i = 0; i < numIPs; i++) {
    var ipv4 = Math.floor(Math.random() * 256) + "." +
               Math.floor(Math.random() * 256) + "." +
               Math.floor(Math.random() * 256) + "." +
               Math.floor(Math.random() * 256);

    var ipv6 = (Math.floor(Math.random() * 65536)).toString(16) + ":" +
               (Math.floor(Math.random() * 65536)).toString(16) + ":" +
               (Math.floor(Math.random() * 65536)).toString(16) + ":" +
               (Math.floor(Math.random() * 65536)).toString(16) + ":" +
               (Math.floor(Math.random() * 65536)).toString(16) + ":" +
               (Math.floor(Math.random() * 65536)).toString(16) + ":" +
               (Math.floor(Math.random() * 65536)).toString(16) + ":" +
               (Math.floor(Math.random() * 65536)).toString(16);

    output.innerHTML += "IPv4: " + ipv4 + "<br>" + "IPv6: " + ipv6 + "<br><br>";
  }
}
</script>

</body>
</html>
