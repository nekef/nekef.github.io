<!DOCTYPE html>
<html>
<head>
    <title>Activity Fetcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background-color: #0056b3;
        }
        p {
            font-size: 1.2em;
            color: #555;
        }
         #help-link {
            position: fixed;
            bottom: 0;
            left: 0;
            color: blue;
        }
       
    </style>
</head>


    
<body>
    <h1>Do Something</h1>
    <button onclick="getActivity()">Get Something</button>
    <p id="activity"></p>
    <p id="type"></p>

    <script>
        function getActivity() {
            fetch('https://www.boredapi.com/api/activity')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('activity').textContent = 'Activity: ' + data.activity;
                    document.getElementById('type').textContent = 'Type: ' + data.type;
                })
                .catch(error => console.error('Error:', error));
        }
    </script>


 

   <a id="help-link" href="/help/help.html">Help</a>


</body>
</html>
